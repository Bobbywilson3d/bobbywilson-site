<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bobby Wilson</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0b0b;
  color:#fff;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

.hero {
  display:flex;
  align-items:center;
  justify-content:space-between;
  min-height:90vh;
}

.hero-text {
  max-width:500px;
}

h1 {
  font-size:48px;
  line-height:1.2;
}

.gold {
  color:#d4af37;
}

p {
  color:#bbb;
  margin:20px 0;
}

.btn {
  background:#d4af37;
  padding:12px 20px;
  color:#000;
  text-decoration:none;
  margin-right:10px;
  display:inline-block;
}

.btn-outline {
  border:1px solid #d4af37;
  padding:12px 20px;
  color:#d4af37;
  text-decoration:none;
}

.hero-image {
  position:relative;
}

.hero-image img.main {
  max-width:450px;
}

.badge {
  position:absolute;
  top:40px;
  right:-80px;
  width:140px;
}

.nfc-box {
  position:absolute;
  bottom:20px;
  right:-80px;
  border:1px solid #d4af37;
  padding:10px;
  font-size:14px;
}
</style>

</head>

<body>

<section class="hero container">

  <div class="hero-text">
    <h1>
      ARTE, TECNOLOGIA E <span class="gold">IDENTIDADE</span><br>
      EM CADA PEÇA
    </h1>

    <p>
      Mascotes colecionáveis premium feitos em impressão 3D,
      pintura manual e edição limitada.
    </p>

    <a href="#" class="btn">QUERO O MEU</a>
    <a href="#" class="btn-outline">VER COLEÇÃO</a>
  </div>

  <div class="hero-image">
    <img src="bobby-hero.PNG" class="main">

    <img src="Selo.PNG" class="badge">

    <div class="nfc-box">
      NFC<br>Conteúdo exclusivo
    </div>
  </div>

</section>

</body>
</html>
